<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  
  <!-- Bar 1 -->
  <rect x="10" y="50" width="12" height="55" rx="6" fill="#a78bfa">
    <animate attributeName="height" values="40;65;40" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="65;40;65" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bar 2 -->
  <rect x="30" y="30" width="12" height="75" rx="6" fill="#8b5cf6">
    <animate attributeName="height" values="55;85;55" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="55;25;55" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bar 3 -->
  <rect x="50" y="15" width="12" height="90" rx="6" fill="#7c3aed">
    <animate attributeName="height" values="70;100;70" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="50;10;50" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Bar 4 -->
  <rect x="70" y="35" width="12" height="70" rx="6" fill="#8b5cf6">
    <animate attributeName="height" values="50;80;50" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="60;30;60" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bar 5 -->
  <rect x="90" y="55" width="12" height="50" rx="6" fill="#a78bfa">
    <animate attributeName="height" values="35;60;35" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="70;45;70" dur="0.9s" repeatCount="indefinite"/>
  </rect>

</svg>